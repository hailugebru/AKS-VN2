apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: demo
  name: demo-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      annotations:
        microsoft.containerinstance.virtualnode.ccepolicy: 
      labels:
        app: demo
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - 'counter=1; while true; do echo "Hello, World! Counter: $counter"; counter=$((counter+1));
          sleep 1; done'
        image: mcr.microsoft.com/azure-cli
        name: hello-world-counter
        resources:
          limits:
            cpu: '1'
            memory: 1G
          requests:
            cpu: 100m
            memory: 128Mi
      nodeSelector:
        kubernetes.io/os: linux
        virtualization: virtualnode2
      tolerations:
      - effect: NoSchedule
        key: virtual-kubelet.io/provider
        operator: Exists
